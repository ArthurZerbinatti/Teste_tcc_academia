<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro | Lavire Academia</title>

    <link rel="stylesheet" href="estilo/Cadastro.css">

</head>

<body>

    <main class="register-layout">

        <!-- HERO -->
        <section class="hero" aria-label="Apresentação da academia">

            <figure class="hero-image">

                <img
                src="Assets/hero-cadastro.png"
                alt="Homem e mulher treinando na academia com iluminação vermelha">

            </figure>

        </section>

        <!-- CADASTRO -->
        <section
        class="register-section"
        aria-labelledby="titulo-cadastro">

            <!-- HEADER -->
            <header class="register-header">

                <img
                src="Assets/Logo.png"
                alt="Logo da Lavire Academia"
                class="logo">

                <div class="hero-copy">

                    <h1 id="titulo-cadastro">

                        CRIE SUA
                        <span class="destaque">
                            CONTA
                        </span>

                    </h1>

                    <p>

                        Preencha os campos abaixo
                        e faça parte da Lavire Academia.

                    </p>

                </div>

            </header>

            <!-- CARD -->
            <article class="register-card">

                <!-- FORM -->
                <form action="Cadastro.php" method="POST">

                    <!-- NOME -->
                    <label for="nome">

                        NOME COMPLETO

                        <div class="input-wrapper">

                            <i aria-hidden="true">

                                <img
                                src="Assets/user-icon.svg"
                                alt="">

                            </i>

                            <input
                            type="text"
                            id="nome"
                            name="nome"
                            placeholder="Digite seu nome completo"
                            autocomplete="name"
                            required>

                        </div>

                    </label>

                    <!-- CPF -->
                    <label for="cpf">

                        CPF

                        <div class="input-wrapper">

                            <i aria-hidden="true">

                                <img
                                src="Assets/cpf-icon.svg"
                                alt="">

                            </i>

                            <input
                            type="text"
                            id="cpf"
                            name="cpf"
                            placeholder="000.000.000-00"
                            inputmode="numeric"
                            maxlength="14"
                            required>

                        </div>

                    </label>

                    <!-- TELEFONE -->
                    <label for="telefone">

                        TELEFONE

                        <div class="input-wrapper">

                            <i aria-hidden="true">

                                <img
                                src="Assets/phone-icon.svg"
                                alt="">

                            </i>

                            <input
                            type="tel"
                            id="telefone"
                            name="telefone"
                            placeholder="(11) 99999-9999"
                            autocomplete="tel"
                            required>

                        </div>

                    </label>

                    <!-- EMAIL -->
                    <label for="email">

                        E-MAIL

                        <div class="input-wrapper">

                            <i aria-hidden="true">

                                <img
                                src="Assets/email-icon.svg"
                                alt="">

                            </i>

                            <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Digite seu e-mail"
                            autocomplete="email"
                            required>

                        </div>

                    </label>

                    <!-- SENHA -->
                    <label for="senha">

                        SENHA

                        <div class="input-wrapper">

                            <i aria-hidden="true">

                                <img
                                src="Assets/lock-icon.svg"
                                alt="">

                            </i>

                            <input
                            type="password"
                            id="senha"
                            name="senha"
                            placeholder="Crie uma senha"
                            autocomplete="new-password"
                            minlength="8"
                            required>

                            <button
                            type="button"
                            class="mostrar-senha"
                            aria-label="Mostrar senha">

                                <img
                                src="Assets/eye-icon.svg"
                                alt="">

                            </button>

                        </div>

                    </label>

                    <!-- GRID -->
                    <div class="form-grid">

                        <!-- SEXO -->
                        <label for="sexo">

                            SEXO

                            <div class="input-wrapper">

                                <i aria-hidden="true">

                                    <img
                                    src="Assets/gender-icon.svg"
                                    alt="">

                                </i>

                                <select
                                id="sexo"
                                name="sexo"
                                required>

                                    <option
                                    value=""
                                    selected
                                    disabled>

                                        Selecione

                                    </option>

                                    <option value="Masculino">
                                        Masculino
                                    </option>

                                    <option value="Feminino">
                                        Feminino
                                    </option>

                                    <option value="Outro">
                                        Outro
                                    </option>

                                </select>

                            </div>

                        </label>

                        <!-- IDADE -->
                        <label for="idade">

                            IDADE

                            <div class="input-wrapper">

                                <i aria-hidden="true">

                                    <img
                                    src="Assets/calendar-icon.svg"
                                    alt="">

                                </i>

                                <input
                                type="number"
                                id="idade"
                                name="idade"
                                placeholder="Ex: 25 anos"
                                min="12"
                                max="120"
                                required>

                            </div>

                        </label>

                    </div>

                    <!-- TERMOS -->
                    <label class="checkbox-wrapper">

                        <input
                        type="checkbox"
                        name="termos"
                        required>

                        <span>

                            Li e concordo com os

                            <a href="#">
                                Termos de Uso
                            </a>

                            e

                            <a href="#">
                                Política de Privacidade
                            </a>

                        </span>

                    </label>

                    <!-- BOTÃO -->
                    <button
                    type="submit"
                    class="btn-register">

                        CADASTRAR

                        <i aria-hidden="true">

                            <img
                            src="Assets/arrow-right.svg"
                            alt="">

                        </i>

                    </button>

                </form>

                <!-- DIVISOR -->
                <div
                class="separator"
                aria-hidden="true">

                    <span></span>

                    <p>OU</p>

                    <span></span>

                </div>

                <!-- LOGIN -->
                <footer class="login-link">

                    <p>
                        Já tem uma conta?
                    </p>

                    <a href="Login.html">
                        FAÇA LOGIN
                    </a>

                </footer>

            </article>

        </section>

    </main>

    <script src="cadastro.js"></script>

</body>

</html>
