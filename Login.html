<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo/base.css">
    <link rel="stylesheet" href="estilo/logo.css">
    <link rel="stylesheet" href="estilo/form_cad-log.css">
    <link rel="stylesheet" href="estilo/particulas.css">
    <link rel="shortcut icon" href="Assets/Academia_Icone.ico" type="image/x-icon">
    <title>Login</title>
</head>
<body>
    <div id="particles-js" aria-hidden="true"></div>
    <header>
        <img src="Assets/Logo.png" alt="Logo da Academia Espaço Livre" id="logo">
    </header>
    <main>
        <form action="Login.php" method="POST">
            <h1>LOGIN</h1>

            <label>
                Email/Tel:
                <input type="text" name="login" required autocomplete="username" inputmode="email">
            </label>
            
            <label>
                Senha:
                <input type="password" name="senha" required autocomplete="current-password">
            </label>
            
            <input type="submit" value="Entrar">
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="particulas.js"></script>
</body>
</html>
